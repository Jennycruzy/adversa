version: '3.9'

# ADVERSA — Multi-node AXL mesh deployment
# Each agent runs its own AXL broker instance (sidecar containers).
# AXL broker is built from src/axl-broker/server.ts — no external image needed.

networks:
  adversa-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  offline-data:

x-axl-build: &axl-build
  build:
    context: .
    dockerfile: Dockerfile.axl
  restart: unless-stopped
  networks:
    - adversa-mesh
  environment:
    AXL_NODE_PORT: "9002"

x-agent-base: &agent-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  networks:
    - adversa-mesh
  restart: unless-stopped
  environment:
    LOG_LEVEL: info
    AXL_NODE_PORT: "9002"
    # KeeperHub MCP server runs as a dedicated service in this compose stack.
    # KEEPERHUB_MCP_URL overrides .env so agents reach the container, not localhost.
    KEEPERHUB_MCP_URL: "http://keeperhub-mcp:3000"

services:

  # ─── KeeperHub MCP Server ────────────────────────────────────────────────────
  # Provides AI-friendly MCP tools: create_workflow, execute_workflow, etc.
  # Bridges to the KeeperHub REST API at https://app.keeperhub.com/api
  # Image: https://docs.keeperhub.com/ai-tools/mcp-server
  keeperhub-mcp:
    image: keeperhub/mcp:latest
    profiles: [mcp]
    restart: unless-stopped
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.5
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      KEEPERHUB_API_KEY: "${KEEPERHUB_API_KEY}"
      MCP_API_KEY: "${KEEPERHUB_MCP_API_KEY}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── AXL Mesh Brokers (one per agent) ────────────────────────────────────────

  axl-gateway:
    <<: *axl-build
    environment:
      AGENT_ROLE: gateway
      AXL_NODE_PORT: "9002"
      PEERS: "security=axl-security:9002,performance=axl-performance:9002,style=axl-style:9002,redteam=axl-redteam:9002,coder=axl-coder:9002"
    ports:
      - "9002:9002"
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:9002/health').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  axl-security:
    <<: *axl-build
    environment:
      AGENT_ROLE: security
      AXL_NODE_PORT: "9002"
      PEERS: "gateway=axl-gateway:9002,performance=axl-performance:9002,style=axl-style:9002,redteam=axl-redteam:9002,coder=axl-coder:9002"
    ports:
      - "9003:9002"
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.11

  axl-performance:
    <<: *axl-build
    environment:
      AGENT_ROLE: performance
      AXL_NODE_PORT: "9002"
      PEERS: "gateway=axl-gateway:9002,security=axl-security:9002,style=axl-style:9002,redteam=axl-redteam:9002,coder=axl-coder:9002"
    ports:
      - "9004:9002"
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.12

  axl-style:
    <<: *axl-build
    environment:
      AGENT_ROLE: style
      AXL_NODE_PORT: "9002"
      PEERS: "gateway=axl-gateway:9002,security=axl-security:9002,performance=axl-performance:9002,redteam=axl-redteam:9002,coder=axl-coder:9002"
    ports:
      - "9005:9002"
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.13

  axl-redteam:
    <<: *axl-build
    environment:
      AGENT_ROLE: redteam
      AXL_NODE_PORT: "9002"
      PEERS: "gateway=axl-gateway:9002,security=axl-security:9002,performance=axl-performance:9002,style=axl-style:9002,coder=axl-coder:9002"
    ports:
      - "9006:9002"
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.14

  axl-coder:
    <<: *axl-build
    environment:
      AGENT_ROLE: coder
      AXL_NODE_PORT: "9002"
      PEERS: "gateway=axl-gateway:9002,security=axl-security:9002,performance=axl-performance:9002,style=axl-style:9002,redteam=axl-redteam:9002"
    ports:
      - "9007:9002"
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.15

  # ─── Agent Services ───────────────────────────────────────────────────────────

  agent-gateway:
    <<: *agent-base
    environment:
      AGENT_ROLE: gateway
      AXL_NODE_HOST: axl-gateway
      AXL_NODE_PORT: "9002"
      DASHBOARD_PORT: "3001"
      DASHBOARD_HOST: "0.0.0.0"
      KEEPERHUB_MCP_URL: "http://keeperhub-mcp:3000"
    depends_on:
      axl-gateway:
        condition: service_healthy
    ports:
      - "3001:3001"
      - "3002:3002"
    volumes:
      - offline-data:/app/data
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.20

  agent-security:
    <<: *agent-base
    environment:
      AGENT_ROLE: security
      AXL_NODE_HOST: axl-security
      AXL_NODE_PORT: "9002"
      KEEPERHUB_MCP_URL: "http://keeperhub-mcp:3000"
    depends_on:
      - axl-security
      - axl-gateway
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.21

  agent-performance:
    <<: *agent-base
    environment:
      AGENT_ROLE: performance
      AXL_NODE_HOST: axl-performance
      AXL_NODE_PORT: "9002"
      KEEPERHUB_MCP_URL: "http://keeperhub-mcp:3000"
    depends_on:
      - axl-performance
      - axl-gateway
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.22

  agent-style:
    <<: *agent-base
    environment:
      AGENT_ROLE: style
      AXL_NODE_HOST: axl-style
      AXL_NODE_PORT: "9002"
      KEEPERHUB_MCP_URL: "http://keeperhub-mcp:3000"
    depends_on:
      - axl-style
      - axl-gateway
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.23

  agent-redteam:
    <<: *agent-base
    environment:
      AGENT_ROLE: redteam
      AXL_NODE_HOST: axl-redteam
      AXL_NODE_PORT: "9002"
      KEEPERHUB_MCP_URL: "http://keeperhub-mcp:3000"
    depends_on:
      - axl-redteam
      - axl-gateway
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.24

  agent-coder:
    <<: *agent-base
    environment:
      AGENT_ROLE: coder
      AXL_NODE_HOST: axl-coder
      AXL_NODE_PORT: "9002"
      KEEPERHUB_MCP_URL: "http://keeperhub-mcp:3000"
    depends_on:
      - axl-coder
      - axl-gateway
    networks:
      adversa-mesh:
        ipv4_address: 172.20.0.25
